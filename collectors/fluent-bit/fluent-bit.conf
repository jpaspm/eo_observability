# =============================================================================
# Fluent Bit — Log Collector
# Enterprise Observability Platform
#
# Purpose : Collect logs from all domains, normalize to OTel LogRecord format,
#           and forward via OTLP to the domain OTel Collector.
#
# Supported sources:
#   - Kubernetes pod logs
#   - Systemd / journald
#   - Application log files
#   - Docker container logs
# =============================================================================

[SERVICE]
    Flush           5
    Daemon          Off
    Log_Level       info
    Parsers_File    parsers.conf
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020
    # Storage for buffering (disk-backed to survive restarts)
    storage.path    /var/log/fluent-bit/buffer
    storage.sync    normal
    storage.checksum off
    storage.max_chunks_up 128

# =============================================================================
# INPUTS
# =============================================================================

## Kubernetes pod log tailing
[INPUT]
    Name                tail
    Tag                 kube.*
    Path                /var/log/containers/*.log
    multiline.parser    docker, cri
    DB                  /var/log/fluent-bit/flb_kube.db
    Mem_Buf_Limit       50MB
    Skip_Long_Lines     On
    Refresh_Interval    10
    storage.type        filesystem

## Systemd / journald logs
[INPUT]
    Name            systemd
    Tag             host.systemd
    Systemd_Filter  _SYSTEMD_UNIT=docker.service
    Systemd_Filter  _SYSTEMD_UNIT=kubelet.service
    Systemd_Filter  _SYSTEMD_UNIT=containerd.service
    DB              /var/log/fluent-bit/flb_systemd.db
    Strip_Underscores On
    storage.type    filesystem

## Application log files
[INPUT]
    Name    tail
    Tag     app.*
    Path    /var/log/app/*.log
    Parser  json
    DB      /var/log/fluent-bit/flb_app.db
    Mem_Buf_Limit 25MB
    storage.type  filesystem

# =============================================================================
# FILTERS — Kubernetes metadata enrichment
# =============================================================================

## Enrich with Kubernetes metadata (pod name, namespace, labels, etc.)
[FILTER]
    Name                kubernetes
    Match               kube.*
    Kube_URL            https://kubernetes.default.svc:443
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_Tag_Prefix     kube.var.log.containers.
    Merge_Log           On
    Merge_Log_Key       log_processed
    Keep_Log            Off
    K8S-Logging.Parser  On
    K8S-Logging.Exclude On
    Annotations         Off
    Labels              On

## Map Kubernetes fields → OTel semantic conventions
[FILTER]
    Name    modify
    Match   kube.*
    # OTel resource attributes from K8s metadata
    Rename  kubernetes.pod_name           k8s.pod.name
    Rename  kubernetes.namespace_name     k8s.namespace.name
    Rename  kubernetes.container_name     k8s.container.name
    Rename  kubernetes.host               host.name
    Rename  kubernetes.pod_id             k8s.pod.uid
    Rename  kubernetes.labels.app         service.name
    Rename  kubernetes.labels.version     service.version
    Rename  kubernetes.labels.environment deployment.environment
    Rename  kubernetes.labels.team        team.owner
    # Remove raw kubernetes nesting
    Remove  kubernetes

## Add EOP standard attributes
[FILTER]
    Name    modify
    Match   *
    Add     eop.domain         infrastructure
    Add     eop.version        1.0.0
    Add     telemetry.sdk.name fluent-bit

## Severity normalization (map common log levels → OTel severity numbers)
[FILTER]
    Name    lua
    Match   *
    script  /fluent-bit/scripts/severity_mapper.lua
    call    map_severity

## Parse structured JSON logs
[FILTER]
    Name    parser
    Match   app.*
    Key_Name log
    Parser  json
    Preserve_Key On
    Reserve_Data On

# =============================================================================
# OUTPUTS
# =============================================================================

## Primary: OTLP/gRPC → Domain OTel Collector
[OUTPUT]
    Name                 opentelemetry
    Match                *
    Host                 ${OTEL_COLLECTOR_HOST}
    Port                 4317
    Logs_uri             /v1/logs
    Log_response_payload True
    Tls                  On
    Tls.verify           On
    Tls.ca_file          /fluent-bit/certs/ca.crt
    Tls.crt_file         /fluent-bit/certs/client.crt
    Tls.key_file         /fluent-bit/certs/client.key
    # OTel resource attributes (sent with every batch)
    Resource             service.name=${SERVICE_NAME}
    Resource             deployment.environment=${DEPLOYMENT_ENV}
    Resource             host.name=${NODE_NAME}
    Resource             cloud.provider=${CLOUD_PROVIDER}
    Resource             cloud.region=${CLOUD_REGION}

## Loki (operational log queries via Grafana)
[OUTPUT]
    Name            loki
    Match           *
    Host            ${LOKI_HOST}
    Port            3100
    Labels          job=fluent-bit,env=${DEPLOYMENT_ENV},domain=infrastructure
    Label_Keys      $k8s.namespace.name,$service.name,$k8s.pod.name
    Remove_Keys     stream,time
    Tls             On
    Tls.verify      On

## S3 (long-term storage for Databricks)
[OUTPUT]
    Name                         s3
    Match                        *
    bucket                       ${S3_LANDING_BUCKET}
    region                       ${AWS_REGION}
    s3_key_format                /otel/logs/infra/%Y/%m/%d/%H/$UUID.gz
    s3_key_format_tag_delimiters .-
    static_file_path             false
    use_put_object               false
    compression                  gzip
    content_type                 application/json
    store_dir                    /var/log/fluent-bit/s3
    total_file_size              50M
    upload_timeout               10m
    preserve_data_ordering       true

## Error output — route failed records to quarantine
[OUTPUT]
    Name    kafka
    Match   *.error
    Brokers ${KAFKA_BOOTSTRAP_SERVERS}
    Topics  logs.quarantine
    Format  json
    Rdkafka_kafka.security.protocol SASL_SSL
