# =============================================================================
# Logstash Pipeline — Applications & Alerting Domain
# Enterprise Observability Platform
#
# Purpose : Ingest logs from Splunk forwarders, AppDynamics, and alert feeds.
#           Normalize field names to OTel semantic conventions.
#           Forward via Kafka (OTLP-JSON) to domain OTel Collector.
#
# File layout:
#   logstash.conf        — main pipeline (this file)
#   logstash.yml         — Logstash process settings
#   pipelines.yml        — pipeline definitions
# =============================================================================

# ── INPUT ─────────────────────────────────────────────────────────────────────
input {

  # Splunk Universal Forwarder (TCP / Beats protocol)
  beats {
    port => 5044
    type => "splunk"
    ssl  => true
    ssl_certificate         => "/etc/logstash/certs/logstash.crt"
    ssl_key                 => "/etc/logstash/certs/logstash.key"
    ssl_certificate_authorities => ["/etc/logstash/certs/ca.crt"]
    ssl_verify_mode         => "force_peer"
    client_inactivity_timeout => 60
  }

  # AppDynamics Machine Agent (TCP syslog format)
  syslog {
    port => 5514
    type => "appdynamics"
    codec => "plain"
  }

  # HTTP endpoint for webhook-based alert tools
  http {
    port => 8080
    type => "alert_webhook"
    codec => json
    ssl  => true
    ssl_certificate => "/etc/logstash/certs/logstash.crt"
    ssl_key         => "/etc/logstash/certs/logstash.key"
  }

  # Kafka consumer (from upstream event topics)
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS}"
    topics            => ["events.raw", "alerts.raw"]
    group_id          => "logstash-normalizer"
    codec             => json
    type              => "kafka_event"
    auto_offset_reset => "latest"
    security_protocol => "SSL"
    ssl_truststore_location => "/etc/logstash/certs/kafka.truststore.jks"
    ssl_keystore_location   => "/etc/logstash/certs/kafka.keystore.jks"
    ssl_truststore_password => "${KAFKA_TRUSTSTORE_PASSWORD}"
    ssl_keystore_password   => "${KAFKA_KEYSTORE_PASSWORD}"
  }
}

# ── FILTERS ───────────────────────────────────────────────────────────────────
filter {

  # ═══════════════════════════════
  # SPLUNK NORMALIZATION
  # ═══════════════════════════════
  if [type] == "splunk" {

    # Parse JSON log body if present
    if [message] =~ /^\{/ {
      json {
        source => "message"
        target => "parsed"
      }
    }

    # Normalize timestamp → OTel timestamp_unix_nano
    date {
      match      => ["[parsed][_time]", "UNIX", "UNIX_MS", "ISO8601"]
      target     => "@timestamp"
      timezone   => "UTC"
    }

    # Map Splunk source fields → OTel resource attributes
    mutate {
      rename => {
        "[parsed][source]"      => "[resource][service.name]"
        "[parsed][host]"        => "[resource][host.name]"
        "[parsed][sourcetype]"  => "[resource][service.type]"
        "[parsed][index]"       => "[resource][splunk.index]"
        "[parsed][_raw]"        => "body"
        "[parsed][severity]"    => "raw_severity"
      }
      add_field => {
        "[resource][service.namespace]"      => "applications"
        "[resource][eop.domain]"             => "applications"
        "[resource][eop.source_tool]"        => "splunk"
        "[resource][telemetry.sdk.name]"     => "opentelemetry"
        "[resource][deployment.environment]" => "${DEPLOYMENT_ENV}"
      }
      remove_field => ["parsed", "@version", "beat", "tags"]
    }

    # OTel severity mapping for Splunk
    translate {
      field       => "raw_severity"
      destination => "severity_number"
      dictionary  => {
        "DEBUG"    => "5"
        "INFO"     => "9"
        "WARN"     => "13"
        "WARNING"  => "13"
        "ERROR"    => "17"
        "CRITICAL" => "21"
        "FATAL"    => "21"
      }
      fallback => "9"
    }
    translate {
      field       => "raw_severity"
      destination => "severity_text"
      dictionary  => {
        "DEBUG"    => "DEBUG"
        "INFO"     => "INFO"
        "WARN"     => "WARN"
        "WARNING"  => "WARN"
        "ERROR"    => "ERROR"
        "CRITICAL" => "FATAL"
        "FATAL"    => "FATAL"
      }
      fallback => "INFO"
    }
    mutate { remove_field => ["raw_severity"] }
  }

  # ═══════════════════════════════
  # APPDYNAMICS NORMALIZATION
  # ═══════════════════════════════
  if [type] == "appdynamics" {

    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:appd_time} \[%{DATA:appd_thread}\] %{LOGLEVEL:appd_level} %{DATA:appd_logger} - %{GREEDYDATA:appd_message}"
      }
      tag_on_failure => ["_grokparsefailure_appd"]
    }

    date {
      match   => ["appd_time", "yyyy-MM-dd HH:mm:ss,SSS", "ISO8601"]
      target  => "@timestamp"
      timezone => "UTC"
    }

    mutate {
      rename => {
        "appd_message" => "body"
        "appd_logger"  => "[attributes][code.namespace]"
        "appd_thread"  => "[attributes][thread.name]"
        "appd_level"   => "raw_severity"
      }
      add_field => {
        "[resource][service.name]"           => "%{[fields][appdynamics_application]}"
        "[resource][service.namespace]"      => "applications"
        "[resource][eop.domain]"             => "applications"
        "[resource][eop.source_tool]"        => "appdynamics"
        "[resource][telemetry.sdk.name]"     => "opentelemetry"
        "[resource][deployment.environment]" => "${DEPLOYMENT_ENV}"
        "[resource][host.name]"              => "%{[agent][hostname]}"
      }
      remove_field => ["appd_time", "appd_thread", "message"]
    }

    # AppDynamics severity (standard Java log levels)
    translate {
      field       => "raw_severity"
      destination => "severity_number"
      dictionary  => {
        "TRACE"   => "1"
        "DEBUG"   => "5"
        "INFO"    => "9"
        "WARN"    => "13"
        "ERROR"   => "17"
        "FATAL"   => "21"
      }
      fallback => "9"
    }
    translate {
      field       => "raw_severity"
      destination => "severity_text"
      dictionary  => {
        "TRACE" => "TRACE"
        "DEBUG" => "DEBUG"
        "INFO"  => "INFO"
        "WARN"  => "WARN"
        "ERROR" => "ERROR"
        "FATAL" => "FATAL"
      }
      fallback => "INFO"
    }
    mutate { remove_field => ["raw_severity"] }
  }

  # ═══════════════════════════════
  # GLOBAL ENRICHMENT (all types)
  # ═══════════════════════════════

  # Compute timestamp_unix_nano from @timestamp
  ruby {
    code => "
      ts = event.get('@timestamp')
      if ts
        event.set('timestamp_unix_nano', (ts.to_f * 1_000_000_000).to_i)
      end
    "
  }

  # Add fingerprint for deduplication
  fingerprint {
    source         => ["body", "[resource][host.name]", "[resource][service.name]"]
    target         => "[attributes][eop.fingerprint]"
    method         => "SHA256"
    concatenate_sources => true
  }

  # Enforce mandatory OTel resource attributes
  if ![resource][service.name] {
    mutate { add_field => { "[resource][service.name]" => "unknown" } }
    mutate { add_tag   => ["_missing_service_name"] }
  }

  if ![resource][host.name] {
    mutate { add_field => { "[resource][host.name]" => "%{[host][name]}" } }
  }

  # Convert severity_number to integer
  mutate {
    convert => { "severity_number" => "integer" }
  }

  # Drop noisy debug events in production
  if [resource][deployment.environment] == "prod" and [severity_number] <= 5 {
    drop {}
  }
}

# ── OUTPUT ────────────────────────────────────────────────────────────────────
output {

  # ── Kafka (primary): domain-namespaced topics ──────────────────────────────
  if [type] == "splunk" or [type] == "appdynamics" {
    kafka {
      bootstrap_servers     => "${KAFKA_BOOTSTRAP_SERVERS}"
      topic_id              => "app.logs"
      codec                 => json
      compression_type      => "zstd"
      batch_size            => 16384
      linger_ms             => 5
      security_protocol     => "SSL"
      ssl_truststore_location => "/etc/logstash/certs/kafka.truststore.jks"
      ssl_keystore_location   => "/etc/logstash/certs/kafka.keystore.jks"
      ssl_truststore_password => "${KAFKA_TRUSTSTORE_PASSWORD}"
      ssl_keystore_password   => "${KAFKA_KEYSTORE_PASSWORD}"
      # Route high-severity to dedicated topic
      topic_id              => "%{[severity_number] >= 17 ? 'app.logs.errors' : 'app.logs'}"
    }
  }

  if [type] == "alert_webhook" {
    kafka {
      bootstrap_servers     => "${KAFKA_BOOTSTRAP_SERVERS}"
      topic_id              => "alerts.enriched"
      codec                 => json
      compression_type      => "zstd"
      security_protocol     => "SSL"
      ssl_truststore_location => "/etc/logstash/certs/kafka.truststore.jks"
      ssl_keystore_location   => "/etc/logstash/certs/kafka.keystore.jks"
      ssl_truststore_password => "${KAFKA_TRUSTSTORE_PASSWORD}"
      ssl_keystore_password   => "${KAFKA_KEYSTORE_PASSWORD}"
    }
  }

  # ── S3 (Databricks landing zone) ──────────────────────────────────────────
  s3 {
    bucket        => "${S3_LANDING_BUCKET}"
    region        => "${AWS_REGION}"
    prefix        => "otel/app/logs/%{+YYYY}/%{+MM}/%{+dd}/%{+HH}/"
    codec         => json_lines
    encoding      => "gzip"
    size_file     => 52428800
    time_file     => 15
    rotation_strategy => size_and_time
    upload_workers_count => 4
  }

  # ── Dead letter queue for failed records ──────────────────────────────────
  if "_grokparsefailure_appd" in [tags] or "_missing_service_name" in [tags] {
    kafka {
      bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS}"
      topic_id          => "logs.quarantine"
      codec             => json
    }
  }
}
