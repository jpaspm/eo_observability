# =============================================================================
# Telegraf Configuration — Infrastructure Domain
# Enterprise Observability Platform
#
# Purpose : Collect host, cloud, and platform metrics and forward as
#            OTel-standardized OTLP to the central OTel Collector.
#
# OTel Semantic Conventions enforced:
#   - system.*        (CPU, memory, disk, network I/O)
#   - host.*          (resource attributes)
#   - service.*       (service metadata)
#   - deployment.*    (environment tagging)
#
# Outputs : OTLP/gRPC → OTel Collector (infra)
#           InfluxDB   → VictoriaMetrics (operational fallback)
# =============================================================================

[global_tags]
  ## OTel resource attributes — applied to every metric
  "service.name"              = "${SERVICE_NAME}"          # e.g. "cloud-insights-collector"
  "service.namespace"         = "infrastructure"
  "service.version"           = "${SERVICE_VERSION}"
  "deployment.environment"    = "${DEPLOYMENT_ENV}"        # prod | staging | dev
  "host.name"                 = "${HOSTNAME}"
  "host.type"                 = "${HOST_TYPE}"             # vm | bare-metal | container
  "cloud.provider"            = "${CLOUD_PROVIDER}"        # aws | azure | gcp | on-prem
  "cloud.region"              = "${CLOUD_REGION}"
  "cloud.account.id"          = "${CLOUD_ACCOUNT_ID}"
  "team.owner"                = "${TEAM_OWNER}"            # e.g. "platform-infra"
  "cost.center"               = "${COST_CENTER}"

[agent]
  ## Collection interval aligned with OTel recommended 60s for infra metrics
  interval            = "60s"
  round_interval      = true
  metric_batch_size   = 1000
  metric_buffer_limit = 100000
  collection_jitter   = "5s"
  flush_interval      = "10s"
  flush_jitter        = "3s"
  precision           = ""
  hostname            = ""                                 # uses global_tags host.name
  omit_hostname       = false
  debug               = false
  quiet               = false
  logfile             = "/var/log/telegraf/telegraf.log"
  logfile_rotation_max_size    = "10MB"
  logfile_rotation_max_archives = 5

# =============================================================================
# OUTPUTS
# =============================================================================

## Primary: OTLP/gRPC to OTel Collector
[[outputs.opentelemetry]]
  service_address = "${OTEL_COLLECTOR_ENDPOINT}"           # e.g. "otel-collector-infra:4317"
  timeout         = "5s"
  compression     = "gzip"

  [outputs.opentelemetry.coerce_timestamps]
    ## Preserve nanosecond precision
    float     = "s"
    uint      = "1ns"
    bool      = "1ns"

  ## TLS for mTLS between telegraf and collector
  [outputs.opentelemetry.tls]
    ca_file   = "/etc/telegraf/certs/ca.crt"
    cert_file = "/etc/telegraf/certs/telegraf.crt"
    key_file  = "/etc/telegraf/certs/telegraf.key"

## Fallback: VictoriaMetrics (InfluxDB line protocol)
[[outputs.influxdb_v2]]
  urls         = ["${VICTORIA_METRICS_URL}"]
  token        = "${VICTORIA_METRICS_TOKEN}"
  organization = "enterprise-observability"
  bucket       = "infra_metrics"
  timeout      = "5s"

# =============================================================================
# PROCESSORS — Metric Renaming to OTel Semantic Conventions
# =============================================================================

## Rename Telegraf default field names → OTel semantic convention names
[[processors.rename]]
  order = 1

  ## CPU: system.cpu.*
  [[processors.rename.replace]]
    measurement = "cpu"
    dest        = "system.cpu"

  ## Memory: system.memory.*
  [[processors.rename.replace]]
    measurement = "mem"
    dest        = "system.memory"

  ## Disk: system.filesystem.*
  [[processors.rename.replace]]
    measurement = "disk"
    dest        = "system.filesystem"

  ## Disk I/O: system.disk.*
  [[processors.rename.replace]]
    measurement = "diskio"
    dest        = "system.disk"

  ## Network: system.network.*
  [[processors.rename.replace]]
    measurement = "net"
    dest        = "system.network"

  ## Process: process.*
  [[processors.rename.replace]]
    measurement = "procstat"
    dest        = "process"

## Enforce OTel field naming within measurements
[[processors.converter]]
  order = 2
  [processors.converter.fields]
    ## CPU fields → OTel names
    float = ["usage_idle", "usage_user", "usage_system", "usage_iowait"]

## Add computed fields / derived metrics
[[processors.starlark]]
  order  = 3
  source = '''
def apply(metric):
    # Compute cpu.utilization from idle
    if metric.name == "system.cpu":
        idle = metric.fields.get("usage_idle", 0)
        metric.fields["system.cpu.utilization"] = round((100.0 - idle) / 100.0, 4)
        metric.fields.pop("usage_idle", None)

    # Normalize memory fields
    if metric.name == "system.memory":
        total = metric.fields.get("total", 1)
        used  = metric.fields.get("used", 0)
        metric.fields["system.memory.utilization"] = round(used / total, 4)
        metric.fields["system.memory.usage"] = used

    return metric
'''

## Tag enrichment — inject standard resource labels
[[processors.override]]
  order = 4
  [processors.override.tags]
    "telemetry.sdk.name"     = "telegraf"
    "telemetry.sdk.version"  = "${TELEGRAF_VERSION}"
    "telemetry.sdk.language" = "go"

## Drop high-cardinality / noisy fields before export
[[processors.strings]]
  order = 5
  [[processors.strings.trim_prefix]]
    field = "usage_"
    prefix = "usage_"

# =============================================================================
# INPUTS — System Metrics (OTel system.* semantics)
# =============================================================================

## CPU — maps to OTel system.cpu.*
[[inputs.cpu]]
  percpu          = true                                   # per-core breakdown
  totalcpu        = true
  collect_cpu_time = false
  report_active   = true
  core_tags       = true
  ## OTel tag: system.cpu.logical_number is set automatically

## Memory — maps to OTel system.memory.*
[[inputs.mem]]
  # All fields collected; starlark processor computes utilization

## Disk — maps to OTel system.filesystem.*
[[inputs.disk]]
  ## Ignore tmpfs/devtmpfs to reduce cardinality
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]
  ## OTel tag: system.filesystem.mountpoint, system.filesystem.type

## Disk I/O — maps to OTel system.disk.*
[[inputs.diskio]]
  devices = []                                             # empty = all devices
  skip_serial_number = true

## Network — maps to OTel system.network.*
[[inputs.net]]
  interfaces = []                                          # empty = all interfaces
  ignore_protocol_stats = false

## Load — maps to OTel system.cpu.load_average.*
[[inputs.system]]
  ## Captures uptime and load average

## Process stats — maps to OTel process.*
[[inputs.procstat]]
  pattern       = ".*"
  pid_tag       = true
  pid_finder    = "native"
  fieldpass     = ["cpu_usage", "memory_rss", "memory_vms", "num_threads"]

# =============================================================================
# INPUTS — Cloud Provider Metrics
# =============================================================================

## AWS CloudWatch (enabled when cloud.provider=aws)
[[inputs.cloudwatch]]
  region      = "${AWS_REGION}"
  access_key  = "${AWS_ACCESS_KEY_ID}"
  secret_key  = "${AWS_SECRET_ACCESS_KEY}"
  period      = "5m"
  delay       = "5m"
  interval    = "5m"
  namespace   = "AWS/EC2"
  ratelimit   = 200

  [[inputs.cloudwatch.metrics]]
    names      = ["CPUUtilization", "NetworkIn", "NetworkOut", "DiskReadBytes", "DiskWriteBytes"]
    [inputs.cloudwatch.metrics.dimensions]
      name  = "InstanceId"
      value = "${AWS_INSTANCE_ID}"

## Kubernetes pod metrics (when running on K8s)
[[inputs.kubernetes]]
  url              = "http://localhost:10255"
  bearer_token     = "/var/run/secrets/kubernetes.io/serviceaccount/token"
  insecure_skip_verify = true

  [inputs.kubernetes.tags]
    "k8s.cluster.name" = "${K8S_CLUSTER_NAME}"
    "k8s.namespace.name" = "${K8S_NAMESPACE}"

# =============================================================================
# INPUTS — Application / Middleware Metrics
# =============================================================================

## Prometheus scrape (for services exposing /metrics)
[[inputs.prometheus]]
  urls            = ["${PROMETHEUS_SCRAPE_TARGETS}"]
  metric_version  = 2
  response_timeout = "5s"
  [inputs.prometheus.tags]
    "scrape.source" = "prometheus"

# =============================================================================
# INPUTS — Log tail for infra logs (forwarded to Loki via OTLP)
# =============================================================================

[[inputs.tail]]
  files        = ["/var/log/syslog", "/var/log/messages", "/var/log/auth.log"]
  from_beginning = false
  pipe         = false
  data_format  = "grok"
  grok_patterns = ["%{SYSLOGLINE}"]

  [inputs.tail.tags]
    "log.source"     = "syslog"
    "log.domain"     = "infrastructure"
    "service.name"   = "${SERVICE_NAME}"

# =============================================================================
# INPUTS — Telegraf self-monitoring (Observability of Observability / O³)
# =============================================================================

[[inputs.internal]]
  collect_memstats = true
  [inputs.internal.tags]
    "telemetry.component" = "telegraf"
    "o3.monitored"        = "true"
